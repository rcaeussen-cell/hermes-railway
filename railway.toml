[build]
builder = "dockerfile"

[deploy]
restartPolicyType = "on_failure"
requiredMountPath = "/data"

[variables]
HERMES_HOME = "/data/.hermes"
HOME = "/data"
HERMES_QUIET = "true"
TELEGRAM_BOT_TOKEN = ""
TELEGRAM_ALLOWED_USERS = ""
HERMES_MODEL = ""
HERMES_PROVIDER = ""
OPENAI_API_KEY = ""
GOOGLE_API_KEY = ""
ANTHROPIC_API_KEY = ""
AGENT_NAME = ""
