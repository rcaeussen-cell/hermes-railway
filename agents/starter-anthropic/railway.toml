[build]
builder = "dockerfile"

[deploy]
restartPolicyType = "on_failure"
requiredMountPath = "/data"

[variables]
HERMES_HOME = "/data/.hermes"
HOME = "/data"
AGENT_NAME = "starter-anthropic"
HERMES_MODEL = "claude-sonnet-4-5"
ANTHROPIC_API_KEY = ""
TELEGRAM_BOT_TOKEN = ""
TELEGRAM_ALLOWED_USERS = ""
