[build]
builder = "dockerfile"

[deploy]
restartPolicyType = "on_failure"
requiredMountPath = "/data"

[variables]
HERMES_HOME = "/data/.hermes"
HOME = "/data"
HERMES_QUIET = "true"
AGENT_NAME = "starter-google"
HERMES_PROVIDER = "gemini"
HERMES_MODEL = "gemini-2.5-flash"
GOOGLE_API_KEY = ""
TELEGRAM_BOT_TOKEN = ""
TELEGRAM_ALLOWED_USERS = ""
