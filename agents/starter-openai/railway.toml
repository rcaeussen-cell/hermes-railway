[build]
builder = "dockerfile"

[deploy]
restartPolicyType = "on_failure"
requiredMountPath = "/data"

[variables]
HERMES_HOME = "/data/.hermes"
HOME = "/data"
HERMES_QUIET = "true"
AGENT_NAME = "starter-openai"
HERMES_PROVIDER = "custom"
HERMES_MODEL = "gpt-5.4-mini"
OPENAI_API_KEY = ""
TELEGRAM_BOT_TOKEN = ""
TELEGRAM_ALLOWED_USERS = ""
