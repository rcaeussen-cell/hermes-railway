[build]
builder = "dockerfile"

[deploy]
restartPolicyType = "on_failure"
requiredMountPath = "/opt/data"

[variables]
HERMES_HOME = "/data/.hermes"
HOME = "/data"
HERMES_QUIET = "true"
HERMES_MODEL = "deepseek-chat"
DEEPSEEK_API_KEY = ""
WHATSAPP_ENABLED = ""
WHATSAPP_MODE = "self-chat"
WHATSAPP_ALLOWED_USERS = ""
TELEGRAM_BOT_TOKEN = ""
TELEGRAM_ALLOWED_USERS = ""
IG_USER_ID = ""
INSTAGRAM_ACCESS_TOKEN = ""
IMGBB_API_KEY = ""
