[build]
builder = "dockerfile"

[deploy]
restartPolicyType = "on_failure"
requiredMountPath = "/data"

[variables]
HERMES_HOME = "/data/.hermes"
HOME = "/data"
HERMES_QUIET = "true"
HERMES_MODEL = "deepseek-chat"
DEEPSEEK_API_KEY = ""
WHATSAPP_ENABLED = ""
WHATSAPP_MODE = "self-chat"
WHATSAPP_ALLOWED_USERS = ""
